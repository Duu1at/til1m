name: wordup
description: "WordUp - English vocabulary learning app with RU/KY translations"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Backend
  supabase_flutter: ^2.9.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Navigation
  go_router: ^15.1.2

  # Audio
  just_audio: ^0.9.43

  # Push notifications
  flutter_local_notifications: ^18.0.1

  # Home widget
  home_widget: ^0.7.0

  # Network & images
  cached_network_image: ^3.4.1
  dio: ^5.8.0+1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

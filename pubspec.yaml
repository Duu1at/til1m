name: til1m
description: "Til1m - English vocabulary learning app with RU/KY translations"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cached_network_image: ^3.4.1
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  easy_localization: ^3.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^21.0.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  google_sign_in: ^6.2.2
  hive_flutter: ^1.1.0
  home_widget: ^0.9.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  flutter_tts: ^4.2.5
  just_audio: ^0.10.5
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^6.1.4
  supabase_flutter: ^2.9.1
  uuid: ^4.5.1
  connectivity_plus: ^7.1.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.15
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.4
  mocktail: ^1.0.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/translations/
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
